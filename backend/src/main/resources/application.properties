spring.application.name=modupos
# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/modupos_db
spring.datasource.username=postgres
spring.datasource.password=admin

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Properties
jwt.secret.key=dfdsfjdsfjdskfjioqwioeqpdspalamfifijeriewopdasldjfeifjmsd
jwt.expiration.time=86400000
jwt.refresh-token.expiration.time=604800000

cloudinary.cloud_name=${CLOUDINARY_NAME}
cloudinary.api_key=${CLOUDINARY_KEY}
cloudinary.api_secret=${CLOUDINARY_SECRET}

# (archivos)
spring.servlet.multipart.max-file-size=5MB
# (JSON + archivos)
spring.servlet.multipart.max-request-size=10MB